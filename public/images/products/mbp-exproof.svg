<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="30%" stop-color="#D1D5DB"/>
      <stop offset="70%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="flange-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="float-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="ex-housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="30%" stop-color="#4B5563"/>
      <stop offset="70%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="tank-wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="50%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Tank outline (right side) -->
  <rect x="390" y="30" width="180" height="320" rx="8" fill="none" stroke="url(#tank-wall)" stroke-width="4" stroke-dasharray="8 4" opacity="0.4"/>
  <text x="480" y="24" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">TANK</text>
  <!-- Liquid in tank -->
  <rect x="394" y="180" width="172" height="166" rx="5" fill="url(#liquid)" opacity="0.3"/>

  <!-- Bypass tube (vertical) -->
  <rect x="305" y="42" width="36" height="310" rx="4" fill="url(#tube)" filter="url(#shadow)"/>
  <!-- Inner tube -->
  <rect x="311" y="48" width="24" height="298" rx="2" fill="#F1F5F9" opacity="0.5"/>
  <!-- Liquid inside bypass -->
  <rect x="311" y="182" width="24" height="164" rx="2" fill="url(#liquid)"/>

  <!-- Float -->
  <rect x="302" y="168" width="42" height="22" rx="6" fill="url(#float-g)" filter="url(#shadow)"/>
  <text x="323" y="183" text-anchor="middle" fill="#92400E" font-family="monospace" font-size="8" font-weight="bold">N S</text>

  <!-- Flap indicators -->
  <!-- Red flaps (liquid) -->
  <rect x="276" y="190" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="206" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="222" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="238" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="254" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="270" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="286" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="302" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="318" width="24" height="10" rx="2" fill="#DC2626"/>
  <rect x="276" y="334" width="24" height="10" rx="2" fill="#DC2626"/>
  <!-- White flaps (empty) -->
  <rect x="276" y="54" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="70" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="86" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="102" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="118" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="134" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="150" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="276" y="166" width="24" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Upper connection to tank -->
  <rect x="341" y="58" width="52" height="18" rx="3" fill="url(#flange-g)"/>
  <rect x="385" y="48" width="12" height="38" rx="3" fill="url(#flange-g)"/>

  <!-- Lower connection to tank -->
  <rect x="341" y="318" width="52" height="18" rx="3" fill="url(#flange-g)"/>
  <rect x="385" y="308" width="12" height="38" rx="3" fill="url(#flange-g)"/>

  <!-- Ex-proof transmitter housing (mounted on side of tube) -->
  <rect x="80" y="100" width="120" height="80" rx="8" fill="url(#ex-housing)" filter="url(#shadow)"/>
  <!-- Wall ribs for explosion containment -->
  <rect x="80" y="110" width="120" height="3" rx="1" fill="#4B5563" opacity="0.5"/>
  <rect x="80" y="167" width="120" height="3" rx="1" fill="#4B5563" opacity="0.5"/>
  <!-- Display -->
  <rect x="95" y="120" width="90" height="35" rx="3" fill="#0F172A"/>
  <text x="140" y="138" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="10" font-weight="bold">4-20mA</text>
  <text x="140" y="150" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="8">62.5%</text>
  <!-- Ex marking -->
  <rect x="100" y="160" width="80" height="14" rx="2" fill="#1F2937"/>
  <text x="140" y="170" text-anchor="middle" fill="#FBBF24" font-family="monospace" font-size="8" font-weight="bold">Ex d IIC T6</text>

  <!-- Armored cable gland -->
  <rect x="75" y="126" width="16" height="18" rx="3" fill="#4B5563" stroke="#6B7280" stroke-width="1.5"/>
  <rect x="65" y="130" width="14" height="10" rx="2" fill="#374151"/>
  <!-- Armored cable -->
  <path d="M65 135 L40 135 L40 200" stroke="#6B7280" stroke-width="3" fill="none"/>
  <path d="M65 135 L40 135 L40 200" stroke="#9CA3AF" stroke-width="1" fill="none" stroke-dasharray="3 2"/>

  <!-- Connection line from transmitter to tube -->
  <line x1="200" y1="140" x2="276" y2="140" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- ATEX badge -->
  <g transform="translate(88, 210)">
    <polygon points="25,0 50,12 50,38 25,50 0,38 0,12" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="9" font-weight="bold">ATEX</text>
    <text x="25" y="34" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="7">Zone 1</text>
  </g>

  <!-- Scale markings -->
  <line x1="264" y1="60" x2="274" y2="60" stroke="#94A3B8" stroke-width="1"/>
  <text x="260" y="64" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="7">100%</text>
  <line x1="264" y1="180" x2="274" y2="180" stroke="#94A3B8" stroke-width="1"/>
  <text x="260" y="184" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="7">50%</text>
  <line x1="264" y1="340" x2="274" y2="340" stroke="#94A3B8" stroke-width="1"/>
  <text x="260" y="344" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="7">0%</text>

  <!-- Labels -->
  <text x="160" y="380" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="16" font-weight="700">Exproof Bypass Seviye</text>
  <text x="160" y="396" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="11">ATEX | Ex d IIC T6 | 4-20mA</text>
</svg>