<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="sensor-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="40%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="sensor-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="tank-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="50%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="water-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="wave-color" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
    <filter id="glow-wave">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Tank structure -->
  <rect x="140" y="55" width="320" height="290" rx="6" fill="none" stroke="url(#tank-g)" stroke-width="4"/>
  <!-- Tank top plate -->
  <rect x="136" y="50" width="328" height="12" rx="3" fill="#6B7280"/>

  <!-- Water inside tank -->
  <rect x="144" y="210" width="312" height="131" rx="3" fill="url(#water-fill)"/>
  <!-- Water surface waves -->
  <path d="M144 210 Q200 205 260 210 Q320 215 380 210 Q430 205 456 210" stroke="#38BDF8" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Sensor mounted on tank top -->
  <rect x="275" y="20" width="50" height="40" rx="6" fill="url(#sensor-body)" filter="url(#shadow)"/>
  <!-- Sensor face (transducer) -->
  <ellipse cx="300" cy="62" rx="18" ry="5" fill="url(#sensor-face)"/>
  <!-- Sensor indicator LED -->
  <circle cx="300" cy="32" r="4" fill="#22C55E" opacity="0.8"/>
  <!-- Cable -->
  <path d="M325 35 Q350 30 370 20 Q390 10 420 10" stroke="#374151" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="418" y="4" width="16" height="14" rx="3" fill="#374151"/>

  <!-- Ultrasonic waves (transmitted) -->
  <path d="M280 75 Q300 80 320 75" stroke="#F59E0B" stroke-width="2" fill="none" opacity="0.9" filter="url(#glow-wave)"/>
  <path d="M268 92 Q300 100 332 92" stroke="#F59E0B" stroke-width="1.8" fill="none" opacity="0.7" filter="url(#glow-wave)"/>
  <path d="M256 110 Q300 120 344 110" stroke="#F59E0B" stroke-width="1.6" fill="none" opacity="0.55" filter="url(#glow-wave)"/>
  <path d="M244 128 Q300 140 356 128" stroke="#F59E0B" stroke-width="1.4" fill="none" opacity="0.4" filter="url(#glow-wave)"/>
  <path d="M232 146 Q300 160 368 146" stroke="#F59E0B" stroke-width="1.2" fill="none" opacity="0.3" filter="url(#glow-wave)"/>
  <path d="M220 164 Q300 180 380 164" stroke="#F59E0B" stroke-width="1" fill="none" opacity="0.2" filter="url(#glow-wave)"/>

  <!-- Reflected waves (dashed) -->
  <path d="M268 195 Q300 200 332 195" stroke="#F59E0B" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="4 3"/>
  <path d="M280 185 Q300 188 320 185" stroke="#F59E0B" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4 3"/>

  <!-- Distance measurement arrows -->
  <line x1="490" y1="62" x2="490" y2="210" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="490,62 485,72 495,72" fill="#DC2626"/>
  <polygon points="490,210 485,200 495,200" fill="#DC2626"/>
  <text x="505" y="140" fill="#DC2626" font-family="monospace" font-size="11" font-weight="bold">d</text>

  <!-- Total height arrow -->
  <line x1="110" y1="62" x2="110" y2="341" stroke="#64748B" stroke-width="1"/>
  <polygon points="110,62 105,72 115,72" fill="#64748B"/>
  <polygon points="110,341 105,331 115,331" fill="#64748B"/>
  <text x="95" y="205" fill="#64748B" font-family="monospace" font-size="10" transform="rotate(-90,95,205)">H (tank)  </text>

  <!-- Level indicator -->
  <line x1="470" y1="210" x2="500" y2="210" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="510" y="214" fill="#0EA5E9" font-size="10">Seviye</text>

  <!-- Blind zone indicator -->
  <rect x="275" y="62" width="50" height="20" fill="#FEF3C7" opacity="0.5"/>
  <text x="350" y="76" fill="#D97706" font-size="8">Kor bolge</text>

  <!-- Info panel -->
  <rect x="30" y="250" width="100" height="80" rx="6" fill="#1E40AF" filter="url(#shadow)"/>
  <rect x="38" y="258" width="84" height="45" rx="3" fill="#0F172A"/>
  <text x="80" y="275" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="12" font-weight="bold">3.25m</text>
  <text x="80" y="292" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="8">LEVEL</text>
  <text x="80" y="320" text-anchor="middle" fill="#BFDBFE" font-size="8">4-20mA out</text>

  <!-- Labels -->
  <text x="300" y="370" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Ultrasonik Seviye Sensoru</text>
  <text x="300" y="392" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="13">Temassiz Olcum | 0.3-15m | %0.25 Hassasiyet</text>
</svg>