<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <radialGradient id="gauge-face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </radialGradient>
    <linearGradient id="gauge-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="30%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="lcd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="25%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="75%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="body-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="50%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Gauge outer rim -->
  <circle cx="300" cy="170" r="120" fill="url(#gauge-rim)" filter="url(#shadow)"/>
  <!-- Gauge body -->
  <circle cx="300" cy="170" r="112" fill="url(#body-dark)"/>
  <!-- Gauge face (white) -->
  <circle cx="300" cy="170" r="100" fill="url(#gauge-face)"/>

  <!-- Scale markings (arc from ~7 o'clock to 5 o'clock) -->
  <!-- Major ticks -->
  <line x1="218" y1="234" x2="228" y2="226" stroke="#1F2937" stroke-width="2"/>
  <line x1="204" y1="200" x2="216" y2="198" stroke="#1F2937" stroke-width="2"/>
  <line x1="205" y1="160" x2="217" y2="162" stroke="#1F2937" stroke-width="2"/>
  <line x1="222" y1="122" x2="232" y2="130" stroke="#1F2937" stroke-width="2"/>
  <line x1="256" y1="96" x2="262" y2="106" stroke="#1F2937" stroke-width="2"/>
  <line x1="297" y1="82" x2="297" y2="94" stroke="#1F2937" stroke-width="2"/>
  <line x1="338" y1="96" x2="332" y2="106" stroke="#1F2937" stroke-width="2"/>
  <line x1="372" y1="122" x2="362" y2="130" stroke="#1F2937" stroke-width="2"/>
  <line x1="389" y1="160" x2="377" y2="162" stroke="#1F2937" stroke-width="2"/>
  <line x1="390" y1="200" x2="378" y2="198" stroke="#1F2937" stroke-width="2"/>
  <line x1="376" y1="234" x2="366" y2="226" stroke="#1F2937" stroke-width="2"/>

  <!-- Scale numbers -->
  <text x="222" y="246" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">0</text>
  <text x="200" y="166" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">4</text>
  <text x="220" y="120" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">6</text>
  <text x="297" y="78" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">10</text>
  <text x="378" y="120" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">14</text>
  <text x="396" y="166" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">16</text>
  <text x="380" y="246" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="600">20</text>

  <!-- Unit label -->
  <text x="300" y="135" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="9">bar</text>

  <!-- LCD display panel (centered in gauge) -->
  <rect x="255" y="155" width="90" height="38" rx="4" fill="url(#lcd-bg)" stroke="#6B7280" stroke-width="0.8"/>
  <text x="300" y="177" text-anchor="middle" fill="#064E3B" font-family="monospace" font-size="18" font-weight="bold">12.34</text>
  <text x="300" y="189" text-anchor="middle" fill="#065F46" font-family="monospace" font-size="8">bar</text>

  <!-- Brand label -->
  <text x="300" y="215" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="8" font-weight="bold">MEOFLOW</text>

  <!-- Gauge needle (pointing at ~12.34 bar position) -->
  <line x1="300" y1="170" x2="354" y2="136" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
  <circle cx="300" cy="170" r="5" fill="#DC2626"/>
  <circle cx="300" cy="170" r="2.5" fill="#FCA5A5"/>

  <!-- Buttons on gauge body (bottom left and right) -->
  <circle cx="255" cy="242" r="6" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="255" y="245" text-anchor="middle" fill="#9CA3AF" font-size="6">MIN</text>
  <circle cx="345" cy="242" r="6" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="345" y="245" text-anchor="middle" fill="#9CA3AF" font-size="6">MAX</text>

  <!-- Process connection (bottom, single port) -->
  <rect x="285" y="280" width="30" height="15" rx="2" fill="url(#gauge-rim)"/>
  <rect x="288" y="295" width="24" height="38" rx="2" fill="url(#steel)"/>
  <!-- Thread lines -->
  <line x1="288" y1="305" x2="312" y2="305" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="288" y1="310" x2="312" y2="310" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="288" y1="315" x2="312" y2="315" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="288" y1="320" x2="312" y2="320" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="288" y1="325" x2="312" y2="325" stroke="#9CA3AF" stroke-width="0.5"/>
  <!-- Hex nut -->
  <polygon points="280,297 286,291 314,291 320,297 314,303 286,303" fill="url(#steel)" stroke="#6B7280" stroke-width="0.8"/>

  <!-- Battery compartment indicator (back) -->
  <g transform="translate(445, 130)">
    <rect width="100" height="50" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="9" font-weight="600">Batarya</text>
    <rect x="15" y="24" width="50" height="18" rx="3" fill="#374151"/>
    <rect x="65" y="28" width="4" height="10" rx="1" fill="#374151"/>
    <rect x="18" y="27" width="35" height="12" rx="2" fill="#22C55E" opacity="0.7"/>
    <text x="75" y="38" fill="#64748B" font-family="monospace" font-size="7">CR2032</text>
  </g>

  <!-- Labels -->
  <text x="300" y="360" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Dijital Manometre</text>
  <text x="300" y="382" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="12">LCD Gosterge | 0-20 bar | Bataryali | Min/Max</text>
</svg>