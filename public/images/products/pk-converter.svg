<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="module-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="din-rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="30%" stop-color="#E5E7EB"/>
      <stop offset="70%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- DIN rail (horizontal, behind module) -->
  <rect x="100" y="195" width="400" height="30" rx="2" fill="url(#din-rail)" filter="url(#shadow)"/>
  <!-- DIN rail profile (hat rail shape) -->
  <rect x="100" y="200" width="400" height="20" rx="1" fill="#D1D5DB"/>
  <rect x="100" y="195" width="400" height="4" rx="1" fill="#9CA3AF"/>
  <rect x="100" y="221" width="400" height="4" rx="1" fill="#9CA3AF"/>

  <!-- Module body (vertical rectangle) -->
  <rect x="230" y="55" width="140" height="310" rx="6" fill="url(#module-body)" filter="url(#shadow)"/>

  <!-- DIN rail clip (back, visible at sides) -->
  <rect x="265" y="200" width="70" height="22" rx="2" fill="#4B5563"/>
  <rect x="272" y="204" width="56" height="14" rx="2" fill="#374151"/>

  <!-- Top terminal block area -->
  <rect x="242" y="65" width="116" height="50" rx="4" fill="#1E3A8A"/>
  <!-- Terminal slots (top - INPUT) -->
  <rect x="252" y="72" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="252" y="72" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="262" y="95" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">IN+</text>

  <rect x="280" y="72" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="280" y="72" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="290" y="95" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">IN-</text>

  <rect x="308" y="72" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="308" y="72" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="318" y="95" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">GND</text>

  <rect x="336" y="72" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="336" y="72" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="346" y="95" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">SHD</text>

  <text x="300" y="110" text-anchor="middle" fill="#DBEAFE" font-family="Inter, sans-serif" font-size="8" font-weight="bold">INPUT</text>

  <!-- Middle section - status and label -->
  <rect x="248" y="120" width="104" height="32" rx="3" fill="#1E3A8A" opacity="0.6"/>
  <text x="300" y="134" text-anchor="middle" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="9" font-weight="bold">MEOFLOW</text>
  <text x="300" y="146" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="7">SC-4020</text>

  <!-- LED indicators -->
  <circle cx="260" cy="165" r="5" fill="#22C55E" opacity="0.8"/>
  <circle cx="260" cy="165" r="3" fill="#4ADE80"/>
  <text x="260" y="178" text-anchor="middle" fill="#DBEAFE" font-family="monospace" font-size="5">PWR</text>

  <circle cx="285" cy="165" r="5" fill="#3B82F6" opacity="0.8"/>
  <circle cx="285" cy="165" r="3" fill="#60A5FA"/>
  <text x="285" y="178" text-anchor="middle" fill="#DBEAFE" font-family="monospace" font-size="5">RUN</text>

  <circle cx="310" cy="165" r="5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="310" cy="165" r="3" fill="#FCD34D" opacity="0.5"/>
  <text x="310" y="178" text-anchor="middle" fill="#DBEAFE" font-family="monospace" font-size="5">ALM</text>

  <circle cx="335" cy="165" r="5" fill="#EF4444" opacity="0.3"/>
  <circle cx="335" cy="165" r="3" fill="#FCA5A5" opacity="0.4"/>
  <text x="335" y="178" text-anchor="middle" fill="#DBEAFE" font-family="monospace" font-size="5">ERR</text>

  <!-- DIP switches area -->
  <rect x="255" y="235" width="90" height="25" rx="3" fill="#1E3A8A"/>
  <rect x="260" y="240" width="8" height="14" rx="1" fill="#374151"/>
  <rect x="260" y="240" width="8" height="7" rx="1" fill="#F59E0B"/>
  <rect x="272" y="240" width="8" height="14" rx="1" fill="#374151"/>
  <rect x="272" y="247" width="8" height="7" rx="1" fill="#F59E0B"/>
  <rect x="284" y="240" width="8" height="14" rx="1" fill="#374151"/>
  <rect x="284" y="240" width="8" height="7" rx="1" fill="#F59E0B"/>
  <rect x="296" y="240" width="8" height="14" rx="1" fill="#374151"/>
  <rect x="296" y="247" width="8" height="7" rx="1" fill="#F59E0B"/>
  <rect x="308" y="240" width="8" height="14" rx="1" fill="#374151"/>
  <rect x="308" y="240" width="8" height="7" rx="1" fill="#F59E0B"/>
  <rect x="320" y="240" width="8" height="14" rx="1" fill="#374151"/>
  <rect x="320" y="247" width="8" height="7" rx="1" fill="#F59E0B"/>
  <text x="300" y="272" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">CONFIG DIP</text>

  <!-- Bottom terminal block area -->
  <rect x="242" y="285" width="116" height="50" rx="4" fill="#1E3A8A"/>
  <!-- Terminal slots (bottom - OUTPUT + POWER) -->
  <rect x="252" y="310" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="252" y="317" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="262" y="306" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">OUT+</text>

  <rect x="280" y="310" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="280" y="317" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="290" y="306" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">OUT-</text>

  <rect x="308" y="310" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="308" y="317" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="318" y="306" text-anchor="middle" fill="#FBBF24" font-family="monospace" font-size="6">24V+</text>

  <rect x="336" y="310" width="20" height="12" rx="2" fill="#374151"/>
  <rect x="336" y="317" width="20" height="5" rx="1" fill="#6B7280"/>
  <text x="346" y="306" text-anchor="middle" fill="#FBBF24" font-family="monospace" font-size="6">24V-</text>

  <text x="300" y="296" text-anchor="middle" fill="#DBEAFE" font-family="Inter, sans-serif" font-size="8" font-weight="bold">OUTPUT / POWER</text>

  <!-- Signal flow diagram (right side) -->
  <rect x="420" y="80" width="160" height="100" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="500" y="100" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Sinyal Donusumu</text>

  <!-- Input signal box -->
  <rect x="435" y="112" width="55" height="24" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="462" y="128" text-anchor="middle" fill="#1E40AF" font-family="monospace" font-size="8">4-20mA</text>
  <!-- Arrow -->
  <path d="M493 124 L508 124 L504 119 M508 124 L504 129" stroke="#475569" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Output signal box -->
  <rect x="512" y="112" width="55" height="24" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="539" y="128" text-anchor="middle" fill="#1E40AF" font-family="monospace" font-size="8">0-10V</text>

  <!-- Conversion types -->
  <rect x="420" y="200" width="160" height="80" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="500" y="220" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="9" font-weight="600">Desteklenen Turler</text>
  <text x="435" y="238" fill="#64748B" font-family="monospace" font-size="7">4-20mA → 0-10V</text>
  <text x="435" y="250" fill="#64748B" font-family="monospace" font-size="7">0-10V → 4-20mA</text>
  <text x="435" y="262" fill="#64748B" font-family="monospace" font-size="7">Pulse → 4-20mA</text>
  <text x="435" y="274" fill="#64748B" font-family="monospace" font-size="7">TC/RTD → 4-20mA</text>

  <!-- Labels -->
  <text x="300" y="380" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">DIN Ray Sinyal Donusturucu</text>
</svg>