<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="device-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="lcd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Device body (compact, rounded rectangle) -->
  <rect x="175" y="40" width="170" height="280" rx="14" fill="url(#device-body)" filter="url(#shadow)"/>

  <!-- Inner bezel -->
  <rect x="183" y="48" width="154" height="264" rx="10" fill="#1E3A8A" opacity="0.5"/>

  <!-- LCD display -->
  <rect x="195" y="60" width="130" height="100" rx="6" fill="url(#lcd-bg)" stroke="#6B7280" stroke-width="0.8"/>

  <!-- LCD content: Temperature -->
  <text x="210" y="82" fill="#064E3B" font-family="monospace" font-size="9">TEMP</text>
  <text x="305" y="82" text-anchor="end" fill="#064E3B" font-family="monospace" font-size="9">°C</text>
  <text x="260" y="108" text-anchor="middle" fill="#064E3B" font-family="monospace" font-size="28" font-weight="bold">23.5</text>

  <!-- LCD content: Humidity -->
  <line x1="200" y1="118" x2="320" y2="118" stroke="#065F46" stroke-width="0.5" opacity="0.5"/>
  <text x="210" y="134" fill="#064E3B" font-family="monospace" font-size="9">RH%</text>
  <text x="305" y="134" text-anchor="end" fill="#064E3B" font-family="monospace" font-size="9">%</text>
  <text x="260" y="155" text-anchor="middle" fill="#064E3B" font-family="monospace" font-size="18" font-weight="bold">65.2</text>

  <!-- WiFi signal icon (top right of screen) -->
  <g transform="translate(298, 62)">
    <path d="M0 10 Q8 0 16 10" stroke="#065F46" stroke-width="1.2" fill="none"/>
    <path d="M3 8 Q8 2 13 8" stroke="#065F46" stroke-width="1.2" fill="none"/>
    <path d="M5 6 Q8 3 11 6" stroke="#065F46" stroke-width="1.2" fill="none"/>
    <circle cx="8" cy="10" r="1.5" fill="#065F46"/>
  </g>

  <!-- Battery icon (top left of screen) -->
  <rect x="200" y="63" width="18" height="8" rx="1.5" stroke="#065F46" stroke-width="0.8" fill="none"/>
  <rect x="218" y="65" width="2" height="4" rx="0.5" fill="#065F46"/>
  <rect x="202" y="65" width="12" height="4" rx="1" fill="#065F46"/>

  <!-- Buttons below display -->
  <circle cx="220" cy="180" r="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="220" y="183" text-anchor="middle" fill="#9CA3AF" font-size="6">SET</text>

  <circle cx="260" cy="180" r="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="260" y="178" text-anchor="middle" fill="#9CA3AF" font-size="8">&#x25B2;</text>
  <text x="260" y="188" text-anchor="middle" fill="#9CA3AF" font-size="8">&#x25BC;</text>

  <circle cx="300" cy="180" r="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="300" y="183" text-anchor="middle" fill="#9CA3AF" font-size="6">OK</text>

  <!-- Status LEDs -->
  <circle cx="220" cy="205" r="4" fill="#22C55E" opacity="0.8"/>
  <text x="220" y="218" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="5">LOG</text>

  <circle cx="250" cy="205" r="4" fill="#3B82F6" opacity="0.8"/>
  <text x="250" y="218" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="5">WiFi</text>

  <circle cx="280" cy="205" r="4" fill="#F59E0B" opacity="0.6"/>
  <text x="280" y="218" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="5">ALM</text>

  <!-- WiFi antenna symbol area -->
  <g transform="translate(235, 230)">
    <rect x="0" y="0" width="50" height="20" rx="3" fill="#1E3A8A" opacity="0.5"/>
    <path d="M10 14 Q25 2 40 14" stroke="#60A5FA" stroke-width="1.5" fill="none"/>
    <path d="M15 12 Q25 4 35 12" stroke="#60A5FA" stroke-width="1.5" fill="none"/>
    <path d="M19 10 Q25 6 31 10" stroke="#60A5FA" stroke-width="1.5" fill="none"/>
    <circle cx="25" cy="14" r="2" fill="#60A5FA"/>
  </g>

  <!-- USB-C port (bottom) -->
  <rect x="245" y="270" width="30" height="10" rx="4" fill="#374151" stroke="#4B5563" stroke-width="0.8"/>
  <rect x="250" y="272" width="20" height="6" rx="2" fill="#1F2937"/>
  <text x="260" y="290" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="6">USB-C</text>

  <!-- Wall-mount bracket (shown on left side) -->
  <rect x="160" y="100" width="18" height="60" rx="2" fill="#6B7280" filter="url(#shadow)"/>
  <rect x="155" y="100" width="10" height="8" rx="1" fill="#4B5563"/>
  <rect x="155" y="152" width="10" height="8" rx="1" fill="#4B5563"/>
  <!-- Screw holes -->
  <circle cx="160" cy="104" r="2.5" fill="#374151"/>
  <circle cx="160" cy="156" r="2.5" fill="#374151"/>

  <!-- Right side: Features -->
  <rect x="400" y="50" width="170" height="90" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="485" y="72" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Kablosuz Ozellikler</text>
  <text x="415" y="90" fill="#64748B" font-family="monospace" font-size="8">WiFi 2.4GHz</text>
  <text x="415" y="104" fill="#64748B" font-family="monospace" font-size="8">Bulut Veri Aktarim</text>
  <text x="415" y="118" fill="#64748B" font-family="monospace" font-size="8">E-posta Alarm</text>
  <text x="415" y="132" fill="#64748B" font-family="monospace" font-size="8">Web Dashboard</text>

  <!-- Specs -->
  <rect x="400" y="160" width="170" height="110" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="485" y="180" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Teknik Ozellikler</text>
  <text x="415" y="198" fill="#64748B" font-family="monospace" font-size="8">Sicaklik: -40~85°C</text>
  <text x="415" y="212" fill="#64748B" font-family="monospace" font-size="8">Nem: 0-100% RH</text>
  <text x="415" y="226" fill="#64748B" font-family="monospace" font-size="8">Hassasiyet: ±0.3°C</text>
  <text x="415" y="240" fill="#64748B" font-family="monospace" font-size="8">Hafiza: 32000 kayit</text>
  <text x="415" y="254" fill="#64748B" font-family="monospace" font-size="8">Batarya: 12 ay</text>
  <text x="415" y="268" fill="#64748B" font-family="monospace" font-size="8">Kayit: 1s - 24h aralik</text>

  <!-- Data graph preview -->
  <rect x="400" y="290" width="170" height="60" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="485" y="306" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="9" font-weight="600">Kayit Grafigi</text>
  <polyline points="415,340 430,332 445,336 460,328 475,335 490,325 505,330 520,322 535,328 550,320"
    stroke="#3B82F6" stroke-width="1.5" fill="none"/>
  <polyline points="415,338 430,342 445,339 460,344 475,340 490,345 505,342 520,346 535,343 550,347"
    stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>

  <!-- Labels -->
  <text x="300" y="370" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Kablosuz Veri Kaydedici</text>
  <text x="300" y="392" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="12">WiFi | LCD | USB-C | Sicaklik/Nem | 32K Kayit</text>
</svg>