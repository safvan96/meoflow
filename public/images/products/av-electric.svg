<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="motor-housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="30%" stop-color="#2563EB"/>
      <stop offset="70%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="valve-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="25%" stop-color="#E5E7EB"/>
      <stop offset="50%" stop-color="#D1D5DB"/>
      <stop offset="75%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="pipe-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="30%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="flange-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- ===== VALVE BODY (bottom) ===== -->
  <!-- Left pipe -->
  <rect x="60" y="270" width="120" height="50" rx="4" fill="url(#pipe-g)"/>
  <!-- Left flange -->
  <rect x="172" y="258" width="18" height="74" rx="2" fill="url(#flange-g)"/>
  <circle cx="181" cy="268" r="3.5" fill="#4B5563"/>
  <circle cx="181" cy="322" r="3.5" fill="#4B5563"/>

  <!-- Valve body (center) -->
  <rect x="190" y="248" width="160" height="94" rx="8" fill="url(#valve-body)" filter="url(#shadow)"/>
  <!-- Bore through valve -->
  <rect x="190" y="277" width="160" height="36" rx="3" fill="#F1F5F9" opacity="0.5"/>

  <!-- Right pipe -->
  <rect x="360" y="270" width="120" height="50" rx="4" fill="url(#pipe-g)"/>
  <!-- Right flange -->
  <rect x="350" y="258" width="18" height="74" rx="2" fill="url(#flange-g)"/>
  <circle cx="359" cy="268" r="3.5" fill="#4B5563"/>
  <circle cx="359" cy="322" r="3.5" fill="#4B5563"/>

  <!-- Flow arrows -->
  <path d="M90 293 L130 293 L125 287 M130 293 L125 299" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M390 293 L430 293 L425 287 M430 293 L425 299" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Valve stem (connecting valve to actuator) -->
  <rect x="256" y="230" width="28" height="24" rx="2" fill="#6B7280"/>

  <!-- ===== ELECTRIC ACTUATOR (top) ===== -->
  <!-- Motor housing -->
  <rect x="210" y="48" width="120" height="185" rx="12" fill="url(#motor-housing)" filter="url(#shadow)"/>

  <!-- Position indicator (top of housing) -->
  <rect x="232" y="55" width="76" height="30" rx="5" fill="#0F172A"/>
  <!-- Indicator dial -->
  <circle cx="270" cy="70" r="10" fill="#1F2937" stroke="#4B5563" stroke-width="1"/>
  <line x1="270" y1="70" x2="270" y2="62" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
  <text x="248" y="82" fill="#22C55E" font-family="monospace" font-size="5">OPEN</text>
  <text x="283" y="82" fill="#EF4444" font-family="monospace" font-size="5">CLOSE</text>
  <!-- Position label -->
  <text x="270" y="96" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="7">POS: 100%</text>

  <!-- Cutaway window showing gears -->
  <rect x="222" y="105" width="96" height="65" rx="4" fill="#1E3A8A" opacity="0.5"/>
  <rect x="226" y="109" width="88" height="57" rx="3" fill="#0F172A" opacity="0.6"/>

  <!-- Main gear (large) -->
  <circle cx="260" cy="138" r="22" fill="url(#gear)" opacity="0.8"/>
  <circle cx="260" cy="138" r="16" fill="#D97706" opacity="0.5"/>
  <circle cx="260" cy="138" r="6" fill="#92400E"/>
  <!-- Gear teeth (simplified) -->
  <rect x="237" y="134" width="46" height="2" rx="1" fill="#B45309" opacity="0.6"/>
  <rect x="256" y="115" width="2" height="46" rx="1" fill="#B45309" opacity="0.6"/>
  <rect x="242" y="120" width="36" height="2" rx="1" fill="#B45309" opacity="0.4" transform="rotate(45 260 138)"/>
  <rect x="242" y="120" width="36" height="2" rx="1" fill="#B45309" opacity="0.4" transform="rotate(-45 260 138)"/>

  <!-- Pinion gear (small, on output shaft) -->
  <circle cx="295" cy="138" r="12" fill="url(#gear)" opacity="0.8"/>
  <circle cx="295" cy="138" r="8" fill="#D97706" opacity="0.5"/>
  <circle cx="295" cy="138" r="4" fill="#92400E"/>

  <!-- Motor winding symbol -->
  <rect x="230" y="175" width="80" height="35" rx="4" fill="#1E3A8A" opacity="0.5"/>
  <text x="270" y="190" text-anchor="middle" fill="#93C5FD" font-family="monospace" font-size="8">MOTOR</text>
  <text x="270" y="203" text-anchor="middle" fill="#60A5FA" font-family="monospace" font-size="7">220VAC/24VDC</text>

  <!-- Manual override handwheel (on side) -->
  <circle cx="340" cy="120" r="20" fill="none" stroke="#4B5563" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="340" cy="120" r="14" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <circle cx="340" cy="120" r="4" fill="#4B5563"/>
  <!-- Handwheel spokes -->
  <line x1="340" y1="102" x2="340" y2="138" stroke="#4B5563" stroke-width="2"/>
  <line x1="322" y1="120" x2="358" y2="120" stroke="#4B5563" stroke-width="2"/>
  <text x="340" y="150" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="7">Manuel</text>
  <text x="340" y="160" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="7">Override</text>

  <!-- Cable entry gland -->
  <rect x="206" y="105" width="16" height="22" rx="4" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <rect x="194" y="112" width="16" height="10" rx="3" fill="#4B5563"/>
  <!-- Cable -->
  <path d="M194 117 L160 117 L160 90" stroke="#6B7280" stroke-width="2.5" fill="none"/>

  <!-- Signal/power info (left side) -->
  <rect x="30" y="50" width="140" height="90" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="100" y="72" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Kontrol Sinyali</text>
  <text x="45" y="90" fill="#64748B" font-family="monospace" font-size="8">4-20mA / 0-10V</text>
  <text x="45" y="104" fill="#64748B" font-family="monospace" font-size="8">ON/OFF kontak</text>
  <text x="45" y="118" fill="#64748B" font-family="monospace" font-size="8">Modbus RS485</text>
  <text x="45" y="132" fill="#64748B" font-family="monospace" font-size="8">Geri bildirim: 4-20mA</text>

  <!-- Torque info -->
  <rect x="30" y="160" width="140" height="50" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="100" y="180" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="9" font-weight="600">Tork Araligi</text>
  <text x="100" y="196" text-anchor="middle" fill="#1E40AF" font-family="monospace" font-size="10">10 - 200 Nm</text>

  <!-- Labels -->
  <text x="300" y="370" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Elektrikli Aktuator</text>
  <text x="300" y="392" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="12">Motor | Disli Mekanizma | Konum Gostergesi | Manuel Kumanda</text>
</svg>