<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="probe-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="25%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="75%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="conn-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="50%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="cable" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="50%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="thermowell" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="30%" stop-color="#A8A29E"/>
      <stop offset="70%" stop-color="#A8A29E"/>
      <stop offset="100%" stop-color="#78716C"/>
    </linearGradient>
    <linearGradient id="element" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Temperature gradient background hint -->
  <rect x="30" y="50" width="540" height="300" rx="8" fill="none"/>

  <!-- Probe assembly - angled for visual interest -->

  <!-- Connection head (top) -->
  <rect x="175" y="50" width="70" height="70" rx="8" fill="url(#conn-head)" filter="url(#shadow)"/>
  <rect x="185" y="60" width="50" height="50" rx="4" fill="#4B5563"/>
  <!-- Terminal block inside -->
  <rect x="193" y="68" width="34" height="34" rx="2" fill="#1F2937"/>
  <circle cx="203" cy="78" r="3" fill="#EF4444"/>
  <circle cx="217" cy="78" r="3" fill="#3B82F6"/>
  <circle cx="203" cy="92" r="3" fill="#EF4444"/>
  <circle cx="217" cy="92" r="3" fill="#3B82F6"/>
  <text x="210" y="100" text-anchor="middle" fill="#9CA3AF" font-size="5">PT100</text>

  <!-- Thread connection -->
  <rect x="195" y="120" width="30" height="20" rx="2" fill="url(#probe-body)"/>
  <line x1="195" y1="125" x2="225" y2="125" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="195" y1="130" x2="225" y2="130" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="195" y1="135" x2="225" y2="135" stroke="#9CA3AF" stroke-width="0.5"/>

  <!-- Hex nut -->
  <polygon points="190,120 195,114 225,114 230,120 225,126 195,126" fill="url(#probe-body)" stroke="#9CA3AF" stroke-width="0.5"/>

  <!-- Thermowell / Protection tube -->
  <rect x="200" y="140" width="20" height="180" rx="2" fill="url(#thermowell)" filter="url(#shadow)"/>

  <!-- Probe tip (rounded) -->
  <ellipse cx="210" cy="320" rx="10" ry="6" fill="#A8A29E"/>

  <!-- Sensing element visible (cutaway hint) -->
  <rect x="205" y="280" width="10" height="30" rx="2" fill="url(#element)" opacity="0.7"/>
  <path d="M208 285 L212 285 L208 290 L212 290 L208 295 L212 295 L208 300 L212 300 L208 305" stroke="#FCA5A5" stroke-width="0.8" fill="none"/>

  <!-- Cable coming from head -->
  <path d="M175 85 Q140 85 120 100 Q90 120 80 160" stroke="url(#cable)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Cable shield -->
  <path d="M80 160 Q75 180 78 200" stroke="url(#cable)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Wire ends -->
  <line x1="72" y1="200" x2="72" y2="220" stroke="#EF4444" stroke-width="2"/>
  <line x1="78" y1="200" x2="78" y2="220" stroke="#3B82F6" stroke-width="2"/>
  <line x1="84" y1="200" x2="84" y2="220" stroke="#F59E0B" stroke-width="2"/>
  <text x="72" y="232" fill="#EF4444" font-size="8">R</text>
  <text x="78" y="232" fill="#3B82F6" font-size="8">B</text>
  <text x="84" y="232" fill="#F59E0B" font-size="8">Y</text>
  <text x="60" y="248" fill="#64748B" font-size="9">3-telli</text>

  <!-- Dimension arrows -->
  <line x1="250" y1="140" x2="250" y2="320" stroke="#94A3B8" stroke-width="0.5"/>
  <line x1="240" y1="140" x2="260" y2="140" stroke="#94A3B8" stroke-width="0.5"/>
  <line x1="240" y1="320" x2="260" y2="320" stroke="#94A3B8" stroke-width="0.5"/>
  <text x="260" y="235" fill="#64748B" font-size="9" transform="rotate(90,260,235)">L = 100~1000mm</text>

  <!-- RTD Curve diagram (right side) -->
  <rect x="340" y="60" width="220" height="150" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="82" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="11" font-weight="600">PT100 Direnc Egrisi</text>
  <!-- Axes -->
  <line x1="370" y1="190" x2="370" y2="95" stroke="#94A3B8" stroke-width="1"/>
  <line x1="370" y1="190" x2="540" y2="190" stroke="#94A3B8" stroke-width="1"/>
  <!-- Curve -->
  <path d="M380 180 Q420 160 450 140 Q480 120 520 105" stroke="#EF4444" stroke-width="2.5" fill="none"/>
  <!-- Labels -->
  <text x="360" y="100" text-anchor="end" fill="#94A3B8" font-size="8">R(ohm)</text>
  <text x="540" y="200" text-anchor="end" fill="#94A3B8" font-size="8">T(C)</text>
  <text x="380" y="200" fill="#94A3B8" font-size="7">0</text>
  <text x="450" y="200" fill="#94A3B8" font-size="7">200</text>
  <text x="520" y="200" fill="#94A3B8" font-size="7">600</text>
  <text x="360" y="182" text-anchor="end" fill="#94A3B8" font-size="7">100</text>
  <text x="360" y="140" text-anchor="end" fill="#94A3B8" font-size="7">200</text>
  <!-- Reference point -->
  <circle cx="380" cy="180" r="3" fill="#EF4444"/>
  <text x="388" y="177" fill="#EF4444" font-size="7">0C=100ohm</text>

  <!-- Specs table (right side) -->
  <rect x="340" y="230" width="220" height="100" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="250" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="11" font-weight="600">Teknik Ozellikler</text>
  <text x="355" y="270" fill="#64748B" font-size="9">Aralık: -200C ~ +600C</text>
  <text x="355" y="285" fill="#64748B" font-size="9">Hassasiyet: Class A / B</text>
  <text x="355" y="300" fill="#64748B" font-size="9">Kılıf: SS316L / Inconel</text>
  <text x="355" y="315" fill="#64748B" font-size="9">Baglanti: 2/3/4 Telli</text>

  <!-- Labels -->
  <text x="300" y="365" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">PT100 Sicaklik Sensoru</text>
  <text x="300" y="387" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="13">Platin Direnc | -200C~+600C | Class A Hassasiyet</text>
</svg>