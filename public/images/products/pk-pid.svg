<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="panel-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="50%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="panel-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="led-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="led-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="din-rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    <filter id="led-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Panel cutout background -->
  <rect x="165" y="35" width="270" height="270" rx="4" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  <text x="300" y="28" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Panel Kesiti: 48x96mm</text>

  <!-- Controller body -->
  <rect x="175" y="45" width="250" height="250" rx="6" fill="url(#panel-body)" filter="url(#shadow)"/>

  <!-- Front face -->
  <rect x="185" y="55" width="230" height="230" rx="4" fill="url(#panel-face)"/>

  <!-- Upper display (PV - Process Value) -->
  <rect x="200" y="68" width="200" height="55" rx="4" fill="#0C0A09"/>
  <rect x="204" y="72" width="192" height="47" rx="2" fill="#1C1917" stroke="#292524" stroke-width="1"/>
  <!-- 7-segment display digits -->
  <text x="300" y="108" text-anchor="middle" fill="url(#led-red)" font-family="monospace" font-size="36" font-weight="bold" filter="url(#led-glow)">425.3</text>
  <text x="205" y="82" fill="#DC2626" font-size="8" opacity="0.7">PV</text>
  <text x="396" y="82" fill="#DC2626" font-size="9" text-anchor="end">C</text>

  <!-- Lower display (SV - Set Value) -->
  <rect x="200" y="130" width="200" height="42" rx="4" fill="#0C0A09"/>
  <rect x="204" y="134" width="192" height="34" rx="2" fill="#1C1917" stroke="#292524" stroke-width="1"/>
  <text x="300" y="160" text-anchor="middle" fill="url(#led-green)" font-family="monospace" font-size="26" font-weight="bold" filter="url(#led-glow)">450.0</text>
  <text x="205" y="143" fill="#22C55E" font-size="8" opacity="0.7">SV</text>

  <!-- Status indicators -->
  <rect x="200" y="180" width="200" height="20" rx="2" fill="#0C0A09"/>
  <circle cx="218" cy="190" r="5" fill="#EF4444" filter="url(#led-glow)"/>
  <text x="228" y="193" fill="#6B7280" font-size="7">OUT1</text>
  <circle cx="270" cy="190" r="5" fill="#1F2937"/>
  <text x="280" y="193" fill="#6B7280" font-size="7">OUT2</text>
  <circle cx="322" cy="190" r="5" fill="#22C55E" filter="url(#led-glow)"/>
  <text x="332" y="193" fill="#6B7280" font-size="7">AT</text>
  <circle cx="370" cy="190" r="5" fill="#1F2937"/>
  <text x="380" y="193" fill="#6B7280" font-size="7">ALM</text>

  <!-- Buttons -->
  <rect x="200" y="210" width="45" height="28" rx="4" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="222" y="228" text-anchor="middle" fill="#D1D5DB" font-size="10" font-weight="bold">SET</text>

  <rect x="252" y="210" width="45" height="28" rx="4" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="274" y="224" text-anchor="middle" fill="#D1D5DB" font-size="14">&#9650;</text>

  <rect x="304" y="210" width="45" height="28" rx="4" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="326" y="228" text-anchor="middle" fill="#D1D5DB" font-size="14">&#9660;</text>

  <rect x="356" y="210" width="45" height="28" rx="4" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <text x="378" y="228" text-anchor="middle" fill="#D1D5DB" font-size="9" font-weight="bold">AT/M</text>

  <!-- Brand label -->
  <text x="300" y="260" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10" font-weight="600">MEOFLOW</text>
  <text x="300" y="275" text-anchor="middle" fill="#4B5563" font-family="Inter, sans-serif" font-size="8">PID CONTROLLER</text>

  <!-- PID Response curve (right side) -->
  <rect x="460" y="55" width="120" height="90" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="520" y="72" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="9" font-weight="600">PID Cevap Egrisi</text>
  <!-- Axes -->
  <line x1="475" y1="130" x2="475" y2="80" stroke="#94A3B8" stroke-width="0.5"/>
  <line x1="475" y1="130" x2="565" y2="130" stroke="#94A3B8" stroke-width="0.5"/>
  <!-- Set point line -->
  <line x1="475" y1="95" x2="565" y2="95" stroke="#22C55E" stroke-width="0.8" stroke-dasharray="3 2"/>
  <!-- PID response curve -->
  <path d="M480 125 Q490 125 495 85 Q498 80 502 90 Q506 100 510 93 Q514 88 520 95 Q530 96 565 95" stroke="#2563EB" stroke-width="1.5" fill="none"/>
  <text x="568" y="93" fill="#22C55E" font-size="6">SP</text>
  <text x="568" y="108" fill="#2563EB" font-size="6">PV</text>

  <!-- Wiring diagram hint (right bottom) -->
  <rect x="460" y="165" width="120" height="130" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="520" y="182" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="9" font-weight="600">Baglanti</text>
  <text x="475" y="200" fill="#64748B" font-size="8">1-2: Besleme AC</text>
  <text x="475" y="215" fill="#64748B" font-size="8">3-4: TC/RTD Giris</text>
  <text x="475" y="230" fill="#64748B" font-size="8">5-6: Role Cikis 1</text>
  <text x="475" y="245" fill="#64748B" font-size="8">7-8: Role Cikis 2</text>
  <text x="475" y="260" fill="#64748B" font-size="8">9-10: 4-20mA Out</text>
  <text x="475" y="275" fill="#64748B" font-size="8">11-12: RS485</text>

  <!-- Labels -->
  <text x="300" y="330" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">PID Sicaklik Kontrolor</text>
  <text x="300" y="352" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="13">Auto-Tune | TC/RTD Giris | Role/SSR Cikis</text>
</svg>