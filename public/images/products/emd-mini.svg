<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="body-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="pipe-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="30%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="display" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="coil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Scale ruler (right side) for size comparison -->
  <rect x="480" y="100" width="20" height="200" rx="2" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="480" y1="100" x2="500" y2="100" stroke="#94A3B8" stroke-width="1"/>
  <line x1="490" y1="120" x2="500" y2="120" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="480" y1="140" x2="500" y2="140" stroke="#94A3B8" stroke-width="1"/>
  <line x1="490" y1="160" x2="500" y2="160" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="480" y1="180" x2="500" y2="180" stroke="#94A3B8" stroke-width="1"/>
  <line x1="490" y1="200" x2="500" y2="200" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="480" y1="220" x2="500" y2="220" stroke="#94A3B8" stroke-width="1"/>
  <line x1="490" y1="240" x2="500" y2="240" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="480" y1="260" x2="500" y2="260" stroke="#94A3B8" stroke-width="1"/>
  <line x1="490" y1="280" x2="500" y2="280" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="480" y1="300" x2="500" y2="300" stroke="#94A3B8" stroke-width="1"/>
  <text x="508" y="104" fill="#94A3B8" font-family="monospace" font-size="7">10cm</text>
  <text x="508" y="184" fill="#94A3B8" font-family="monospace" font-size="7">5cm</text>
  <text x="508" y="304" fill="#94A3B8" font-family="monospace" font-size="7">0cm</text>

  <!-- Size comparison bracket -->
  <path d="M460 155 L470 155 L470 260 L460 260" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="465" y="212" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8" transform="rotate(-90 465 212)">DN15</text>

  <!-- Left small pipe -->
  <rect x="80" y="195" width="100" height="30" rx="4" fill="url(#pipe-g)" filter="url(#shadow)"/>

  <!-- Right small pipe -->
  <rect x="380" y="195" width="60" height="30" rx="4" fill="url(#pipe-g)" filter="url(#shadow)"/>

  <!-- Left thread connection -->
  <rect x="175" y="188" width="16" height="44" rx="2" fill="#9CA3AF"/>
  <line x1="175" y1="194" x2="191" y2="194" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="175" y1="198" x2="191" y2="198" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="175" y1="222" x2="191" y2="222" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="175" y1="226" x2="191" y2="226" stroke="#6B7280" stroke-width="0.5"/>

  <!-- Right thread connection -->
  <rect x="370" y="188" width="16" height="44" rx="2" fill="#9CA3AF"/>
  <line x1="370" y1="194" x2="386" y2="194" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="370" y1="198" x2="386" y2="198" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="370" y1="222" x2="386" y2="222" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="370" y1="226" x2="386" y2="226" stroke="#6B7280" stroke-width="0.5"/>

  <!-- Compact flowmeter body -->
  <rect x="191" y="168" width="179" height="84" rx="8" fill="url(#body-blue)" filter="url(#shadow)"/>

  <!-- Coils (compact) -->
  <rect x="200" y="182" width="10" height="56" rx="2" fill="url(#coil)" opacity="0.7"/>
  <rect x="350" y="182" width="10" height="56" rx="2" fill="url(#coil)" opacity="0.7"/>

  <!-- Inner lining -->
  <rect x="214" y="185" width="132" height="50" rx="4" fill="#1E3A8A" opacity="0.4"/>
  <rect x="218" y="189" width="124" height="42" rx="3" fill="#DBEAFE" opacity="0.3"/>

  <!-- Electrodes -->
  <circle cx="232" cy="210" r="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="328" cy="210" r="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- Flow arrows (small) -->
  <path d="M250 207 L275 207 L271 202 M275 207 L271 212" stroke="#38BDF8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M290 210 L315 210 L311 205 M315 210 L311 215" stroke="#38BDF8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Integrated transmitter/display (directly on body) -->
  <rect x="240" y="80" width="80" height="76" rx="6" fill="url(#body-blue)" filter="url(#shadow)"/>
  <rect x="250" y="88" width="60" height="38" rx="3" fill="url(#display)"/>
  <text x="280" y="105" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="9" font-weight="bold">2.45 L/m</text>
  <text x="280" y="118" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="7">TOTAL: 156L</text>
  <!-- Buttons -->
  <circle cx="258" cy="140" r="3.5" fill="#334155" stroke="#475569" stroke-width="0.8"/>
  <circle cx="280" cy="140" r="3.5" fill="#334155" stroke="#475569" stroke-width="0.8"/>
  <circle cx="302" cy="140" r="3.5" fill="#334155" stroke="#475569" stroke-width="0.8"/>
  <!-- Connection neck -->
  <rect x="267" y="154" width="26" height="16" rx="2" fill="#1E40AF"/>
  <!-- Cable gland -->
  <rect x="252" y="72" width="10" height="12" rx="2" fill="#374151"/>

  <!-- Dimension annotation -->
  <line x1="191" y1="268" x2="370" y2="268" stroke="#64748B" stroke-width="0.8"/>
  <line x1="191" y1="262" x2="191" y2="274" stroke="#64748B" stroke-width="0.8"/>
  <line x1="370" y1="262" x2="370" y2="274" stroke="#64748B" stroke-width="0.8"/>
  <text x="280" y="282" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="9">120 mm</text>

  <!-- Labels -->
  <text x="280" y="330" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Minyatur Debimetre</text>
  <text x="280" y="352" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="12">DN3-DN25 | Kompakt Tasarim | Entegre Transmitter</text>
</svg>