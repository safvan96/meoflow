<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="body-steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="25%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="75%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="display-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="40%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="diaphragm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <radialGradient id="gauge-face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Transmitter body (cylindrical housing) -->
  <rect x="240" y="40" width="120" height="200" rx="12" fill="url(#housing)" filter="url(#shadow)"/>

  <!-- Display window -->
  <rect x="255" y="55" width="90" height="70" rx="6" fill="url(#display-bg)"/>
  <text x="300" y="82" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="16" font-weight="bold">4.25</text>
  <text x="300" y="100" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="10">bar</text>
  <text x="300" y="118" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">16.4 mA</text>

  <!-- Buttons -->
  <circle cx="270" cy="145" r="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="300" cy="145" r="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="330" cy="145" r="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="270" y="148" text-anchor="middle" fill="#94A3B8" font-size="6">Z</text>
  <text x="300" y="148" text-anchor="middle" fill="#94A3B8" font-size="6">S</text>
  <text x="330" y="148" text-anchor="middle" fill="#94A3B8" font-size="6">M</text>

  <!-- Cable glands -->
  <rect x="255" y="35" width="20" height="16" rx="4" fill="#374151"/>
  <rect x="325" y="35" width="20" height="16" rx="4" fill="#374151"/>

  <!-- Rating label -->
  <rect x="260" y="165" width="80" height="30" rx="4" fill="#1E3A8A" opacity="0.6"/>
  <text x="300" y="177" text-anchor="middle" fill="#BFDBFE" font-family="Inter, sans-serif" font-size="7">MEOFLOW</text>
  <text x="300" y="189" text-anchor="middle" fill="#93C5FD" font-family="Inter, sans-serif" font-size="7">BT-2000</text>

  <!-- Neck/connection area -->
  <rect x="270" y="240" width="60" height="30" rx="3" fill="url(#body-steel)"/>

  <!-- Diaphragm sensing element -->
  <ellipse cx="300" cy="280" rx="40" ry="15" fill="url(#diaphragm)" filter="url(#shadow)"/>
  <ellipse cx="300" cy="280" rx="30" ry="10" fill="#E5E7EB" opacity="0.5"/>

  <!-- Process connection thread -->
  <rect x="285" y="290" width="30" height="40" rx="2" fill="url(#body-steel)"/>
  <!-- Thread lines -->
  <line x1="285" y1="300" x2="315" y2="300" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="285" y1="305" x2="315" y2="305" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="285" y1="310" x2="315" y2="310" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="285" y1="315" x2="315" y2="315" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="285" y1="320" x2="315" y2="320" stroke="#9CA3AF" stroke-width="0.5"/>

  <!-- Hex nut -->
  <polygon points="280,292 285,285 315,285 320,292 315,299 285,299" fill="url(#body-steel)" stroke="#6B7280" stroke-width="1"/>

  <!-- Signal diagram (right side) -->
  <rect x="410" y="80" width="150" height="100" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="485" y="100" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Sinyal Cikisi</text>
  <!-- Signal line -->
  <line x1="425" y1="165" x2="425" y2="110" stroke="#94A3B8" stroke-width="0.5"/>
  <line x1="425" y1="165" x2="545" y2="165" stroke="#94A3B8" stroke-width="0.5"/>
  <path d="M430 160 L470 140 L510 125 L540 115" stroke="#2563EB" stroke-width="2" fill="none"/>
  <text x="425" y="108" text-anchor="middle" fill="#94A3B8" font-size="8">20mA</text>
  <text x="545" y="175" text-anchor="middle" fill="#94A3B8" font-size="8">bar</text>
  <text x="415" y="168" text-anchor="end" fill="#94A3B8" font-size="8">4mA</text>

  <!-- Pressure arrow (left side) -->
  <rect x="60" y="80" width="130" height="100" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="125" y="100" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Olcum Prensibi</text>
  <!-- Mini diaphragm diagram -->
  <rect x="85" y="115" width="80" height="40" rx="4" fill="#DBEAFE"/>
  <path d="M95 135 Q125 120 155 135" stroke="#2563EB" stroke-width="2" fill="none"/>
  <path d="M115 155 L115 145 M125 160 L125 145 M135 155 L135 145" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round"/>
  <text x="125" y="170" text-anchor="middle" fill="#64748B" font-size="8">Basinc</text>

  <!-- Labels -->
  <text x="300" y="360" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Basinc Transmitteri</text>
  <text x="300" y="382" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="13">Piezorezistif | 0-600 bar | 4-20mA Cikis</text>
</svg>