<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="heavy-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="30%" stop-color="#1E40AF"/>
      <stop offset="70%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="cast-housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="30%" stop-color="#6B7280"/>
      <stop offset="70%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="pipe-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="30%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="flange-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="display" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="coil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Left pipe -->
  <rect x="20" y="195" width="115" height="70" rx="4" fill="url(#pipe-g)" filter="url(#shadow)"/>
  <!-- Left flange (heavy-duty) -->
  <rect x="128" y="172" width="28" height="116" rx="3" fill="url(#flange-g)"/>
  <circle cx="142" cy="185" r="5" fill="#4B5563"/>
  <circle cx="142" cy="275" r="5" fill="#4B5563"/>
  <circle cx="142" cy="210" r="5" fill="#4B5563"/>
  <circle cx="142" cy="250" r="5" fill="#4B5563"/>

  <!-- Right pipe -->
  <rect x="465" y="195" width="115" height="70" rx="4" fill="url(#pipe-g)" filter="url(#shadow)"/>
  <!-- Right flange (heavy-duty) -->
  <rect x="444" y="172" width="28" height="116" rx="3" fill="url(#flange-g)"/>
  <circle cx="458" cy="185" r="5" fill="#4B5563"/>
  <circle cx="458" cy="275" r="5" fill="#4B5563"/>
  <circle cx="458" cy="210" r="5" fill="#4B5563"/>
  <circle cx="458" cy="250" r="5" fill="#4B5563"/>

  <!-- Thick-walled flowmeter body -->
  <rect x="156" y="162" width="288" height="136" rx="12" fill="url(#heavy-body)" filter="url(#shadow)"/>
  <!-- Extra wall thickness indicators -->
  <rect x="162" y="168" width="276" height="124" rx="8" fill="#1E40AF" opacity="0.3"/>

  <!-- Coils -->
  <rect x="172" y="185" width="18" height="90" rx="3" fill="url(#coil)" opacity="0.7"/>
  <rect x="410" y="185" width="18" height="90" rx="3" fill="url(#coil)" opacity="0.7"/>

  <!-- Inner pipe lining -->
  <rect x="195" y="195" width="210" height="70" rx="5" fill="#1E3A8A" opacity="0.5"/>
  <rect x="200" y="200" width="200" height="60" rx="4" fill="#DBEAFE" opacity="0.2"/>

  <!-- Electrodes -->
  <circle cx="215" cy="230" r="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="385" cy="230" r="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- Flow arrows -->
  <path d="M240 225 L270 225 L265 219 M270 225 L265 231" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M310 230 L340 230 L335 224 M340 230 L335 236" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Heavy cast explosion-proof enclosure (top) -->
  <rect x="225" y="38" width="150" height="108" rx="10" fill="url(#cast-housing)" filter="url(#shadow)"/>
  <!-- Thick wall ribs -->
  <rect x="225" y="48" width="150" height="4" rx="1" fill="#4B5563" opacity="0.5"/>
  <rect x="225" y="132" width="150" height="4" rx="1" fill="#4B5563" opacity="0.5"/>
  <!-- Side ribs -->
  <rect x="225" y="38" width="5" height="108" rx="1" fill="#4B5563" opacity="0.3"/>
  <rect x="370" y="38" width="5" height="108" rx="1" fill="#4B5563" opacity="0.3"/>

  <!-- Display (protected behind glass) -->
  <rect x="248" y="58" width="104" height="50" rx="4" fill="url(#display)" stroke="#6B7280" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="11" font-weight="bold">125.8 m³/h</text>
  <text x="300" y="98" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="8">FLOW RATE</text>

  <!-- Ex marking on housing -->
  <rect x="252" y="116" width="96" height="18" rx="3" fill="#374151"/>
  <text x="300" y="129" text-anchor="middle" fill="#FBBF24" font-family="monospace" font-size="10" font-weight="bold">Ex d IIC T6</text>

  <!-- Connection neck (armored) -->
  <rect x="280" y="142" width="40" height="24" rx="3" fill="#4B5563"/>

  <!-- Explosion-proof cable glands (armored entries) -->
  <rect x="216" y="60" width="24" height="22" rx="4" fill="#4B5563" stroke="#6B7280" stroke-width="1.5"/>
  <rect x="222" y="48" width="12" height="16" rx="3" fill="#374151"/>
  <rect x="360" y="60" width="24" height="22" rx="4" fill="#4B5563" stroke="#6B7280" stroke-width="1.5"/>
  <rect x="366" y="48" width="12" height="16" rx="3" fill="#374151"/>

  <!-- Armored cable -->
  <path d="M228 48 L228 28 Q228 22 234 22 L260 22" stroke="#6B7280" stroke-width="3" fill="none"/>
  <path d="M228 48 L228 28 Q228 22 234 22 L260 22" stroke="#9CA3AF" stroke-width="1" fill="none" stroke-dasharray="4 3"/>

  <!-- ATEX certification badge -->
  <g transform="translate(60, 60)">
    <polygon points="30,0 60,15 60,45 30,60 0,45 0,15" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="30" y="25" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="9" font-weight="bold">ATEX</text>
    <text x="30" y="38" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="7">Zone 1</text>
    <text x="30" y="48" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="7">IIC T6</text>
  </g>

  <!-- Labels -->
  <text x="300" y="330" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Exproof Debimetre</text>
  <text x="300" y="352" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="12">ATEX | Ex d IIC T6 | Zirhli Kablo Giris | IP67</text>
</svg>