<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="pp-tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="30%" stop-color="#DBEAFE"/>
      <stop offset="70%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="pp-flange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="50%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="float-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="tank-wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="50%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Tank outline (PP, lighter colored) -->
  <rect x="370" y="35" width="190" height="320" rx="8" fill="none" stroke="url(#tank-wall)" stroke-width="3" stroke-dasharray="8 4" opacity="0.5"/>
  <text x="465" y="28" text-anchor="middle" fill="#60a5fa" font-family="Inter, sans-serif" font-size="11">PP TANK</text>
  <!-- Chemical liquid in tank -->
  <rect x="374" y="190" width="182" height="161" rx="5" fill="url(#liquid)" opacity="0.3"/>

  <!-- PP Bypass tube (lighter blue to show PP material) -->
  <rect x="285" y="48" width="36" height="310" rx="6" fill="url(#pp-tube)" filter="url(#shadow)"/>
  <!-- Inner tube visible area -->
  <rect x="292" y="55" width="22" height="296" rx="3" fill="#F0FDF4" opacity="0.4"/>

  <!-- Chemical liquid inside tube -->
  <rect x="292" y="192" width="22" height="159" rx="2" fill="url(#liquid)"/>

  <!-- Float -->
  <rect x="282" y="178" width="42" height="20" rx="5" fill="url(#float-g)" filter="url(#shadow)"/>
  <text x="303" y="192" text-anchor="middle" fill="#92400E" font-family="monospace" font-size="7" font-weight="bold">N S</text>

  <!-- Flap indicators -->
  <!-- Green flaps (chemical liquid) -->
  <rect x="258" y="198" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="213" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="228" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="243" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="258" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="273" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="288" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="303" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="318" width="22" height="10" rx="2" fill="#10B981"/>
  <rect x="258" y="333" width="22" height="10" rx="2" fill="#10B981"/>
  <!-- White flaps (empty) -->
  <rect x="258" y="58" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="73" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="88" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="103" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="118" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="133" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="148" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="163" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="258" y="178" width="22" height="10" rx="2" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- PP Flanges (lighter weight, plastic look) -->
  <rect x="321" y="64" width="52" height="16" rx="4" fill="url(#pp-flange)"/>
  <rect x="365" y="56" width="10" height="32" rx="3" fill="url(#pp-flange)"/>
  <circle cx="370" cy="64" r="2.5" fill="#60a5fa"/>
  <circle cx="370" cy="80" r="2.5" fill="#60a5fa"/>

  <rect x="321" y="320" width="52" height="16" rx="4" fill="url(#pp-flange)"/>
  <rect x="365" y="312" width="10" height="32" rx="3" fill="url(#pp-flange)"/>
  <circle cx="370" cy="320" r="2.5" fill="#60a5fa"/>
  <circle cx="370" cy="336" r="2.5" fill="#60a5fa"/>

  <!-- Pressure rating badge (lower for PP) -->
  <g transform="translate(60, 45)">
    <rect width="100" height="45" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="9" font-weight="600">Malzeme: PP</text>
    <text x="50" y="30" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">Basinc: PN6</text>
    <text x="50" y="42" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">Temp: -20~80°C</text>
  </g>

  <!-- Chemical resistance symbols -->
  <g transform="translate(60, 110)">
    <rect width="100" height="75" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" fill="#059669" font-family="Inter, sans-serif" font-size="9" font-weight="600">Kimyasal</text>
    <text x="50" y="28" text-anchor="middle" fill="#059669" font-family="Inter, sans-serif" font-size="9" font-weight="600">Dayanim</text>
    <text x="12" y="44" fill="#059669" font-family="monospace" font-size="8">HCl</text>
    <text x="50" y="44" fill="#059669" font-family="monospace" font-size="8">NaOH</text>
    <text x="12" y="58" fill="#059669" font-family="monospace" font-size="8">H2SO4</text>
    <text x="12" y="70" fill="#059669" font-family="monospace" font-size="8">FeCl3</text>
    <text x="55" y="58" fill="#059669" font-family="monospace" font-size="8">HF</text>
    <text x="55" y="70" fill="#059669" font-family="monospace" font-size="8">HNO3</text>
  </g>

  <!-- Transmitter (small, optional) -->
  <rect x="68" y="220" width="80" height="48" rx="5" fill="#1E40AF" filter="url(#shadow)"/>
  <rect x="76" y="228" width="64" height="24" rx="3" fill="#0F172A"/>
  <text x="108" y="244" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="9">4-20mA</text>
  <text x="108" y="260" text-anchor="middle" fill="#93C5FD" font-family="Inter, sans-serif" font-size="7">Transmitter</text>
  <line x1="148" y1="244" x2="258" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Scale markings -->
  <line x1="244" y1="65" x2="256" y2="65" stroke="#94A3B8" stroke-width="1"/>
  <text x="240" y="69" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="7">100%</text>
  <line x1="244" y1="190" x2="256" y2="190" stroke="#94A3B8" stroke-width="1"/>
  <text x="240" y="194" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="7">50%</text>
  <line x1="244" y1="345" x2="256" y2="345" stroke="#94A3B8" stroke-width="1"/>
  <text x="240" y="349" text-anchor="end" fill="#94A3B8" font-family="monospace" font-size="7">0%</text>

  <!-- Labels -->
  <text x="140" y="380" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="16" font-weight="700">PP Bypass Seviye</text>
  <text x="140" y="396" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="11">Polipropilen | PN6 | Kimyasal Dayanim</text>
</svg>