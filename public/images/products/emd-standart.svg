<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="30%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="display" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="coil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="flange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>
  <rect x="0" y="0" width="600" height="400" rx="12" fill="url(#water)" opacity="0.1"/>

  <!-- Left pipe -->
  <rect x="20" y="165" width="140" height="70" rx="4" fill="url(#pipe)" filter="url(#shadow)"/>
  <!-- Left flange -->
  <rect x="150" y="148" width="22" height="104" rx="3" fill="url(#flange)"/>
  <circle cx="161" cy="160" r="4" fill="#4B5563"/>
  <circle cx="161" cy="240" r="4" fill="#4B5563"/>
  <circle cx="161" cy="180" r="4" fill="#4B5563"/>
  <circle cx="161" cy="220" r="4" fill="#4B5563"/>

  <!-- Right pipe -->
  <rect x="440" y="165" width="140" height="70" rx="4" fill="url(#pipe)" filter="url(#shadow)"/>
  <!-- Right flange -->
  <rect x="428" y="148" width="22" height="104" rx="3" fill="url(#flange)"/>
  <circle cx="439" cy="160" r="4" fill="#4B5563"/>
  <circle cx="439" cy="240" r="4" fill="#4B5563"/>
  <circle cx="439" cy="180" r="4" fill="#4B5563"/>
  <circle cx="439" cy="220" r="4" fill="#4B5563"/>

  <!-- Flow meter body -->
  <rect x="172" y="130" width="256" height="140" rx="10" fill="url(#body)" filter="url(#shadow)"/>

  <!-- Coils (left and right inside body) -->
  <rect x="185" y="155" width="18" height="90" rx="3" fill="url(#coil)" opacity="0.8"/>
  <rect x="185" y="155" width="18" height="15" rx="2" fill="#92400E"/>
  <rect x="185" y="230" width="18" height="15" rx="2" fill="#92400E"/>

  <rect x="397" y="155" width="18" height="90" rx="3" fill="url(#coil)" opacity="0.8"/>
  <rect x="397" y="155" width="18" height="15" rx="2" fill="#92400E"/>
  <rect x="397" y="230" width="18" height="15" rx="2" fill="#92400E"/>

  <!-- Electrodes -->
  <circle cx="220" cy="200" r="6" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>
  <circle cx="380" cy="200" r="6" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>

  <!-- Inner pipe lining (PTFE) -->
  <rect x="208" y="162" width="184" height="76" rx="6" fill="#1E3A8A" opacity="0.5"/>
  <rect x="212" y="166" width="176" height="68" rx="4" fill="#DBEAFE" opacity="0.3"/>

  <!-- Flow arrows inside pipe -->
  <path d="M240 195 L270 195 L265 188 M270 195 L265 202" stroke="#38BDF8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M290 200 L320 200 L315 193 M320 200 L315 207" stroke="#38BDF8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M340 195 L370 195 L365 188 M370 195 L365 202" stroke="#38BDF8" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Display housing on top -->
  <rect x="240" y="52" width="120" height="80" rx="8" fill="url(#body)" filter="url(#shadow)"/>
  <rect x="250" y="60" width="100" height="50" rx="4" fill="url(#display)"/>

  <!-- Display text -->
  <text x="300" y="80" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="11" font-weight="bold">125.8 m³/h</text>
  <text x="300" y="98" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="9">FLOW RATE</text>

  <!-- Connection neck -->
  <rect x="285" y="125" width="30" height="12" rx="2" fill="#1E40AF"/>

  <!-- Buttons -->
  <circle cx="260" cy="120" r="4" fill="#374151" stroke="#6B7280" stroke-width="1"/>
  <circle cx="280" cy="120" r="4" fill="#374151" stroke="#6B7280" stroke-width="1"/>
  <circle cx="340" cy="120" r="4" fill="#374151" stroke="#6B7280" stroke-width="1"/>

  <!-- Cable gland -->
  <rect x="245" y="42" width="14" height="14" rx="3" fill="#374151"/>
  <rect x="341" y="42" width="14" height="14" rx="3" fill="#374151"/>

  <!-- Labels -->
  <text x="300" y="310" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Elektromanyetik Debimetre</text>
  <text x="300" y="335" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="13">Faraday Prensibi | DN15-DN3000 | %0.5 Hassasiyet</text>

  <!-- Magnetic field lines (decorative) -->
  <path d="M210 155 Q300 135 390 155" stroke="#F59E0B" stroke-width="1" fill="none" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M210 245 Q300 265 390 245" stroke="#F59E0B" stroke-width="1" fill="none" stroke-dasharray="4 3" opacity="0.5"/>
</svg>