<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="conn-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="transmitter-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="sheath" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="25%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="75%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="600" height="400" rx="12" fill="#F8FAFC"/>

  <!-- Connection head (DIN-B form, larger to show transmitter inside) -->
  <rect x="185" y="50" width="130" height="110" rx="10" fill="url(#conn-head)" filter="url(#shadow)"/>
  <!-- Head lid -->
  <rect x="190" y="44" width="120" height="14" rx="5" fill="#1E3A8A"/>
  <!-- Lid screws -->
  <circle cx="210" cy="51" r="3.5" fill="#374151" stroke="#4B5563" stroke-width="0.5"/>
  <circle cx="290" cy="51" r="3.5" fill="#374151" stroke="#4B5563" stroke-width="0.5"/>

  <!-- Interior of connection head (cutaway) -->
  <rect x="198" y="66" width="104" height="82" rx="6" fill="#F1F5F9"/>

  <!-- DIN-B head-mount transmitter module (inside) -->
  <circle cx="250" cy="105" r="32" fill="url(#transmitter-body)" filter="url(#shadow)"/>
  <circle cx="250" cy="105" r="28" fill="#2563EB"/>
  <!-- Transmitter PCB/board visible -->
  <circle cx="250" cy="105" r="22" fill="#1E3A8A" opacity="0.5"/>

  <!-- Terminal screws on transmitter -->
  <circle cx="236" cy="88" r="4" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="236" y="91" text-anchor="middle" fill="#374151" font-size="5" font-weight="bold">IN+</text>
  <circle cx="264" cy="88" r="4" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="264" y="91" text-anchor="middle" fill="#374151" font-size="5" font-weight="bold">IN-</text>
  <circle cx="236" cy="122" r="4" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="236" y="125" text-anchor="middle" fill="#374151" font-size="5" font-weight="bold">OUT+</text>
  <circle cx="264" cy="122" r="4" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="264" y="125" text-anchor="middle" fill="#374151" font-size="5" font-weight="bold">OUT-</text>

  <!-- Center label on transmitter -->
  <text x="250" y="108" text-anchor="middle" fill="#DBEAFE" font-family="monospace" font-size="7" font-weight="bold">Pt100</text>

  <!-- Cable entry gland (top left) -->
  <rect x="180" y="78" width="16" height="22" rx="3" fill="#374151"/>
  <rect x="168" y="84" width="16" height="10" rx="2" fill="#4B5563"/>

  <!-- 2-wire output cable -->
  <path d="M168 89 L130 89 L130 60 L100 60" stroke="#EF4444" stroke-width="2" fill="none"/>
  <path d="M168 89 L130 89 L130 72 L100 72" stroke="#3B82F6" stroke-width="2" fill="none"/>
  <text x="80" y="58" text-anchor="end" fill="#EF4444" font-family="monospace" font-size="8">4-20mA (+)</text>
  <text x="80" y="76" text-anchor="end" fill="#3B82F6" font-family="monospace" font-size="8">4-20mA (-)</text>

  <!-- Probe/sheath going down -->
  <rect x="240" y="158" width="20" height="170" rx="3" fill="url(#sheath)" filter="url(#shadow)"/>
  <!-- Process connection thread -->
  <rect x="232" y="156" width="36" height="20" rx="2" fill="url(#sheath)"/>
  <line x1="232" y1="162" x2="268" y2="162" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="232" y1="166" x2="268" y2="166" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="232" y1="170" x2="268" y2="170" stroke="#9CA3AF" stroke-width="0.5"/>
  <!-- Hex -->
  <polygon points="227,160 233,154 267,154 273,160 267,166 233,166" fill="url(#sheath)" stroke="#6B7280" stroke-width="0.8"/>

  <!-- Sensing element at tip -->
  <rect x="243" y="318" width="14" height="10" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>

  <!-- Right side: 2-wire circuit diagram -->
  <rect x="340" y="50" width="220" height="130" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="72" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="11" font-weight="600">2-Tel Baglanti Semasi</text>

  <!-- Power supply box -->
  <rect x="370" y="90" width="60" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="400" y="108" text-anchor="middle" fill="#1E40AF" font-family="monospace" font-size="8">24VDC</text>

  <!-- Transmitter symbol -->
  <circle cx="500" cy="105" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="500" y="108" text-anchor="middle" fill="#1E40AF" font-family="monospace" font-size="7">TT</text>

  <!-- Wiring -->
  <line x1="430" y1="98" x2="482" y2="98" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="430" y1="112" x2="482" y2="112" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Current indicator -->
  <path d="M455 90 L455 84 L462 87 Z" fill="#F59E0B"/>
  <text x="460" y="82" fill="#F59E0B" font-family="monospace" font-size="7">4-20mA</text>

  <!-- PLC/DCS box -->
  <rect x="370" y="140" width="60" height="25" rx="3" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="400" y="156" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">PLC/DCS</text>
  <line x1="400" y1="120" x2="400" y2="140" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Specifications box -->
  <rect x="340" y="200" width="220" height="90" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="220" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="10" font-weight="600">Teknik Ozellikler</text>
  <text x="355" y="238" fill="#64748B" font-family="monospace" font-size="8">Giris: Pt100 / Pt1000</text>
  <text x="355" y="252" fill="#64748B" font-family="monospace" font-size="8">Cikis: 4-20mA (2-tel)</text>
  <text x="355" y="266" fill="#64748B" font-family="monospace" font-size="8">Hassasiyet: ±0.1°C</text>
  <text x="355" y="280" fill="#64748B" font-family="monospace" font-size="8">Montaj: DIN-B Kafa Ici</text>

  <!-- Labels -->
  <text x="300" y="365" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="18" font-weight="700">Sicaklik Transmiteri</text>
  <text x="300" y="387" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="12">DIN-B Kafa Montaj | 4-20mA | 2-Tel | Pt100</text>
</svg>